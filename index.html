<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケストポスカ確認用</title>
    <style>
        :root {
            --orange: #d45228;
            --blue:   #3a7ab5;
            --bg:     #181f26;
            --panel:  #1e2830;
            --surface:#252f38;
            --border: #2e3d4a;
            --text:   #e8edf2;
            --muted:  #607080;
            --pokestop-blue: #30bef0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, 'Helvetica Neue', 'Hiragino Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: .7rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .78rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
        }
        .logo-dot {
            width: 8px; height: 8px;
            background: var(--orange);
            border-radius: 50%;
        }

        .mode-switch {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        .mode-btn {
            background: none;
            border: none;
            border-right: 1px solid var(--border);
            color: var(--muted);
            padding: 6px 12px;
            cursor: pointer;
            transition: background .15s, color .15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mode-btn:last-child { border-right: none; }
        .mode-btn.active { background: var(--orange); color: #fff; }
        
        .icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem 3rem;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: var(--panel);
            border: 1px solid var(--border);
        }

        .stage {
            background: var(--pokestop-blue);
            padding: 2.5rem 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            user-select: none;
            transition: background 0.3s;
        }
        .stage.drag-over { outline: 2px dashed var(--orange); outline-offset: -4px; }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            border-radius: 50%;
            z-index: 10;
        }
        .nav-btn:hover:not(:disabled) { background: rgba(255, 255, 255, 0.4); }
        .nav-btn:disabled { opacity: 0; cursor: default; }
        .nav-btn.prev { left: 10px; }
        .nav-btn.next { right: 10px; }

        .frame-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            transition: opacity .3s;
        }
        .ring-1 { width: 282px; height: 282px; border: 2.5px solid #fff; }
        .ring-2 { width: 302px; height: 302px; border: 1px solid rgba(255,255,255,.3); }

        .mode-gift .ring { opacity: 0; }
        .mode-disk .ring { opacity: 1; }

        .holder {
            width: 260px; height: 260px;
            overflow: hidden;
            position: relative;
            background: #000;
            flex-shrink: 0;
            transition: border-radius .3s;
            border: 3px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .mode-disk .holder { border-radius: 50%; }
        .mode-gift .holder { border-radius: 0; }

        .holder img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
            user-select: none;
        }

        .empty {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 10px; color: #fff; font-size: 12px; text-align: center;
        }

        .counter {
            margin-top: 1rem;
            font-size: 12px;
            color: #fff;
            letter-spacing: 1px;
            min-height: 16px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .dots {
            display: flex; gap: 6px; margin-top: .5rem;
            min-height: 10px;
        }
        .dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            cursor: pointer;
            transition: background .15s;
        }
        .dot.active { background: #fff; }

        .controls {
            border-top: 1px solid var(--border);
            padding: 1rem 1.25rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: .85rem;
        }

        .thumbs {
            display: flex; flex-wrap: wrap; gap: 5px;
            min-height: 0;
        }
        .thumb {
            width: 42px; height: 42px;
            object-fit: cover;
            border: 2px solid transparent;
            cursor: pointer;
            opacity: .5;
            transition: opacity .15s, border-color .15s;
        }
        .thumb.active { border-color: var(--orange); opacity: 1; }
        .thumb:hover { opacity: .85; }

        .dropzone {
            border: 1px dashed var(--border);
            padding: .9rem;
            text-align: center;
            cursor: pointer;
            transition: border-color .15s;
        }
        .dropzone:hover, .dropzone.drag-over { border-color: var(--orange); }
        .drop-label {
            display: flex; align-items: center; justify-content: center;
            gap: 7px; color: var(--muted); font-size: 13px; cursor: pointer;
        }
        .dropzone:hover .drop-label,
        .dropzone.drag-over .drop-label { color: var(--text); }
        input[type="file"] { display: none; }

        .hint {
            font-size: 11px;
            color: var(--muted);
            text-align: center;
        }
    </style>
</head>
<body class="mode-disk">

<header>
    <div class="logo">
        <span class="logo-dot"></span>
        Spot Preview
    </div>
    <div class="mode-switch">
        <button class="mode-btn active" id="btn-disk" title="ディスクモード">
            <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
        </button>
        <button class="mode-btn" id="btn-gift" title="ギフトモード">
            <svg class="icon" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="1"/></svg>
        </button>
    </div>
</header>

<main>
    <div class="card">
        <div class="stage" id="stage">
            <button class="nav-btn prev" id="btn-prev" disabled>&#8249;</button>
            <button class="nav-btn next" id="btn-next" disabled>&#8250;</button>

            <div class="frame-wrap">
                <div class="ring ring-2"></div>
                <div class="ring ring-1"></div>
                <div class="holder" id="holder">
                    <div class="empty" id="emptyState">
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="1.2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <path d="M21 15l-5-5L5 21"/>
                        </svg>
                        <span>画像をドロップ<br>または下から選択</span>
                    </div>
                </div>
            </div>

            <div class="counter" id="counter"></div>
            <div class="dots"   id="dots"></div>
        </div>

        <div class="controls">
            <div class="thumbs" id="thumbs"></div>

            <div class="dropzone" id="dropzone">
                <label class="drop-label" for="fileInput">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2.2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    画像を選択（複数可）
                </label>
                <input type="file" id="fileInput" accept="image/*" multiple>
            </div>

            <p class="hint">← → キーまたは矢印ボタンで切替</p>
        </div>
    </div>
</main>

<script>
let imgs    = [];
let current = 0;

const body      = document.body;
const holder    = document.getElementById('holder');
const empty     = document.getElementById('emptyState');
const counterEl = document.getElementById('counter');
const dotsEl    = document.getElementById('dots');
const thumbsEl  = document.getElementById('thumbs');
const stage     = document.getElementById('stage');
const btnPrev   = document.getElementById('btn-prev');
const btnNext   = document.getElementById('btn-next');
const dropzone  = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const btnDisk   = document.getElementById('btn-disk');
const btnGift   = document.getElementById('btn-gift');

btnDisk.addEventListener('click', () => setMode('disk'));
btnGift.addEventListener('click', () => setMode('gift'));

function setMode(m) {
    body.className = 'mode-' + m;
    btnDisk.classList.toggle('active', m === 'disk');
    btnGift.classList.toggle('active', m === 'gift');
}

fileInput.addEventListener('change', e => load(e.target.files));

const preventDefault = e => e.preventDefault();
['dragover', 'drop'].forEach(evt => {
    stage.addEventListener(evt, preventDefault);
    dropzone.addEventListener(evt, preventDefault);
});

dropzone.addEventListener('dragenter', () => dropzone.classList.add('drag-over'));
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => { 
    dropzone.classList.remove('drag-over'); 
    load(e.dataTransfer.files); 
});

stage.addEventListener('dragenter', () => stage.classList.add('drag-over'));
stage.addEventListener('dragleave', () => stage.classList.remove('drag-over'));
stage.addEventListener('drop', e => { 
    stage.classList.remove('drag-over'); 
    load(e.dataTransfer.files); 
});

function load(fileList) {
    const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
    if (!files.length) return;
    let n = 0;
    const start = imgs.length;
    files.forEach(f => {
        const r = new FileReader();
        r.onload = e => {
            imgs.push({ src: e.target.result });
            if (++n === files.length) { 
                current = start; 
                render(); 
            }
        };
        r.readAsDataURL(f);
    });
}

function render() {
    const old = holder.querySelector('img');
    if (old) old.remove();

    empty.style.display = imgs.length ? 'none' : 'flex';
    if (!imgs.length) {
        counterEl.textContent = '';
        dotsEl.innerHTML = '';
        thumbsEl.innerHTML = '';
        btnPrev.disabled = true;
        btnNext.disabled = true;
        return;
    }

    current = Math.max(0, Math.min(current, imgs.length - 1));

    const el = document.createElement('img');
    el.src = imgs[current].src;
    holder.appendChild(el);

    counterEl.textContent = `${current + 1} / ${imgs.length}`;

    dotsEl.innerHTML = '';
    imgs.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot' + (i === current ? ' active' : '');
        d.addEventListener('click', () => { current = i; render(); });
        dotsEl.appendChild(d);
    });

    thumbsEl.innerHTML = '';
    imgs.forEach((im, i) => {
        const t = document.createElement('img');
        t.src = im.src;
        t.className = 'thumb' + (i === current ? ' active' : '');
        t.addEventListener('click', () => { current = i; render(); });
        thumbsEl.appendChild(t);
    });

    btnPrev.disabled = current === 0;
    btnNext.disabled = current === imgs.length - 1;
}

btnPrev.addEventListener('click', () => { if(current > 0) { current--; render(); } });
btnNext.addEventListener('click', () => { if(current < imgs.length - 1) { current++; render(); } });
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' && current > 0) { current--; render(); }
    if (e.key === 'ArrowRight' && current < imgs.length - 1) { current++; render(); }
});

render();
</script>

</body>
</html>
