<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケストポスカ確認用</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='15' fill='%231e2830'/><circle cx='16' cy='16' r='15' fill='none' stroke='%233a7ab5' stroke-width='2.5'/><circle cx='16' cy='16' r='6' fill='white'/><circle cx='16' cy='16' r='4' fill='%23d45228'/></svg>">
    <style>
        :root {
            --orange: #d45228;
            --blue:   #3a7ab5;
            --bg:     #181f26;
            --panel:  #1e2830;
            --surface:#252f38;
            --border: #2e3d4a;
            --text:   #e8edf2;
            --muted:  #607080;
            --good:   #4caf82;
            --warn:   #c9a43a;
            --bad:    #c0454a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, 'Helvetica Neue', 'Hiragino Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ── */
        header {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: .7rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: .75rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .78rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            white-space: nowrap;
        }
        .logo-dot {
            width: 8px; height: 8px;
            background: var(--orange);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        /* モード切替 */
        .mode-switch {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        .mode-btn {
            background: none;
            border: none;
            border-right: 1px solid var(--border);
            color: var(--muted);
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s, color .15s;
            white-space: nowrap;
        }
        .mode-btn:last-child { border-right: none; }
        .mode-btn.active { background: var(--orange); color: #fff; }

        /* ガイドボタン（ヘッダー内） */
        .guide-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            font-family: monospace;
            border-radius: 4px;
            transition: color .15s, border-color .15s, background .15s;
            flex-shrink: 0;
        }
        .guide-btn:hover  { color: var(--text); border-color: var(--muted); }
        .guide-btn.active { color: #fff; background: var(--orange); border-color: var(--orange); }

        /* ── MAIN ── */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem 0;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-bottom: none;
        }

        .stage {
            background: #111820;
            padding: 2.5rem 3rem 1.75rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            user-select: none;
            touch-action: pan-y;
        }
        .stage.drag-over { outline: 2px dashed var(--orange); outline-offset: -4px; }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            transition: color .15s, border-color .15s;
        }
        .nav-btn:hover:not(:disabled) { color: var(--text); border-color: var(--muted); }
        .nav-btn:disabled { opacity: .2; cursor: default; }
        .nav-btn.prev { left: 10px; }
        .nav-btn.next { right: 10px; }

        .frame-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            transition: opacity .3s;
        }
        .ring-1 { width: 282px; height: 282px; border: 2.5px solid var(--blue); }
        .ring-2 { width: 302px; height: 302px; border: 1px solid rgba(58,122,181,.3); }

        .mode-gift .ring { opacity: 0; }
        .mode-disk .ring { opacity: 1; }

        .holder {
            width: 260px; height: 260px;
            overflow: hidden;
            position: relative;
            background: #000;
            flex-shrink: 0;
            transition: border-radius .3s;
        }

        .mode-disk .holder { border-radius: 50%;  border: 3px solid #fff; }
        .mode-gift .holder { border-radius: 6px;  border: 3px solid #fff; }

        .holder img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
            user-select: none;
        }

        .empty {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 10px; color: #3a4a58; font-size: 12px; text-align: center;
        }

        /* ガイドオーバーレイ */
        .guide-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }
        .guide-overlay svg { width: 100%; height: 100%; }
        .mode-disk .guide-overlay { border-radius: 50%; overflow: hidden; }
        .mode-gift .guide-overlay { border-radius: 6px; overflow: hidden; }

        /* ガイドラベル（画像左下） */
        .guide-label {
            position: absolute;
            bottom: -22px;
            left: 0;
            font-size: 10px;
            letter-spacing: .5px;
            color: var(--muted);
            pointer-events: none;
            min-width: 40px;
        }

        /* カウンター・ドット */
        .counter {
            margin-top: 1rem;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 1px;
            min-height: 16px;
        }
        .dots {
            display: flex; gap: 6px; margin-top: .5rem;
            min-height: 10px;
        }
        .dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--border);
            cursor: pointer;
            transition: background .15s;
        }
        .dot.active { background: var(--orange); }

        /* 解像度インジケーター */
        .res-info {
            margin-top: 1rem;
            width: 100%;
            max-width: 260px;
            display: none;
            flex-direction: column;
            gap: 5px;
        }
        .res-info.visible { display: flex; }

        .res-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
        }
        .res-label { color: var(--muted); }
        .res-value {
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            font-size: 12px;
        }
        .res-value.good { color: var(--good); }
        .res-value.warn { color: var(--warn); }
        .res-value.bad  { color: var(--bad);  }

        .res-bar-track {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }
        .res-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width .4s ease, background .4s ease;
        }

        /* ── CONTROLS ── */
        .controls {
            border-top: 1px solid var(--border);
            padding: 1rem 1.25rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: .85rem;
        }

        .thumbs {
            display: flex; flex-wrap: wrap; gap: 5px;
            min-height: 0;
        }
        .thumb {
            width: 42px; height: 42px;
            object-fit: cover;
            border: 2px solid transparent;
            cursor: pointer;
            opacity: .5;
            transition: opacity .15s, border-color .15s;
        }
        .thumb.active { border-color: var(--orange); opacity: 1; }
        .thumb:hover { opacity: .85; }

        .dropzone {
            border: 1px dashed var(--border);
            padding: .9rem;
            text-align: center;
            cursor: pointer;
            transition: border-color .15s;
        }
        .dropzone:hover, .dropzone.drag-over { border-color: var(--orange); }
        .drop-label {
            display: flex; align-items: center; justify-content: center;
            gap: 7px; color: var(--muted); font-size: 13px; cursor: pointer;
        }
        .dropzone:hover .drop-label,
        .dropzone.drag-over .drop-label { color: var(--text); }
        input[type="file"] { display: none; }

        .hint {
            font-size: 11px;
            color: var(--border);
            text-align: center;
        }

        /* ── フッター免責 ── */
        .disclaimer-wrap {
            display: flex;
            justify-content: center;
            padding: 0 1rem 3rem;
        }
        .disclaimer {
            width: 100%;
            max-width: 520px;
            border: 1px solid var(--border);
            border-top: none;
            padding: .75rem 1.25rem;
            font-size: 11px;
            color: var(--muted);
            line-height: 1.7;
            text-align: center;
        }
    </style>
</head>
<body class="mode-disk">

<header>
    <div class="logo">
        <span class="logo-dot"></span>
        ポケストポスカ確認用
    </div>
    <div class="header-controls">
        <div class="mode-switch">
            <button class="mode-btn active" id="btn-disk">ディスク</button>
            <button class="mode-btn"        id="btn-gift">カード</button>
        </div>
        <button class="guide-btn" id="guideBtn" title="ガイド切替 (#)">#</button>
    </div>
</header>

<main>
    <div class="card">
        <div class="stage" id="stage">
            <button class="nav-btn prev" id="btn-prev" disabled>&#8249;</button>
            <button class="nav-btn next" id="btn-next" disabled>&#8250;</button>

            <div class="frame-wrap">
                <div class="ring ring-2"></div>
                <div class="ring ring-1"></div>
                <div class="holder" id="holder">
                    <div class="empty" id="emptyState">
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="1.2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <path d="M21 15l-5-5L5 21"/>
                        </svg>
                        <span>画像をドロップ<br>または下から選択</span>
                    </div>
                    <div class="guide-overlay" id="guideOverlay">
                        <svg id="guideSvg" viewBox="0 0 260 260" preserveAspectRatio="none"></svg>
                    </div>
                </div>
                <span class="guide-label" id="guideLabel"></span>
            </div>

            <div class="counter" id="counter"></div>
            <div class="dots" id="dots"></div>

            <div class="res-info" id="resInfo">
                <div class="res-row">
                    <span class="res-label">実効解像度</span>
                    <span class="res-value" id="resValue">—</span>
                </div>
                <div class="res-bar-track">
                    <div class="res-bar-fill" id="resBar" style="width:0%"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="thumbs" id="thumbs"></div>
            <div class="dropzone" id="dropzone">
                <label class="drop-label" for="fileInput">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2.2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    画像を追加(複数可)
                </label>
                <input type="file" id="fileInput" accept="image/*" multiple>
            </div>
            <p class="hint">スワイプ・← → キー・矢印ボタンで切替　／　# でガイド切替</p>
        </div>
    </div>
</main>

<div class="disclaimer-wrap">
    <div class="disclaimer">
        Exif情報(位置情報など)の消失やその他のリスクを防ぐため、保存・編集機能はありません。<br>
        ゲーム内での見え方・解像度の確認にご利用ください(閲覧専用)。
    </div>
</div>

<script>
let imgs      = [];
let current   = 0;
let guideMode = 0; // 0=off 1=center 2=thirds

const body       = document.body;
const holder     = document.getElementById('holder');
const empty      = document.getElementById('emptyState');
const counterEl  = document.getElementById('counter');
const dotsEl     = document.getElementById('dots');
const thumbsEl   = document.getElementById('thumbs');
const stage      = document.getElementById('stage');
const btnPrev    = document.getElementById('btn-prev');
const btnNext    = document.getElementById('btn-next');
const dropzone   = document.getElementById('dropzone');
const fileInput  = document.getElementById('fileInput');
const btnDisk    = document.getElementById('btn-disk');
const btnGift    = document.getElementById('btn-gift');
const resInfo    = document.getElementById('resInfo');
const resValue   = document.getElementById('resValue');
const resBar     = document.getElementById('resBar');
const guideBtn   = document.getElementById('guideBtn');
const guideSvg   = document.getElementById('guideSvg');
const guideLabel = document.getElementById('guideLabel');

// ── MODE ──────────────────────────────────────────
btnDisk.addEventListener('click', () => setMode('disk'));
btnGift.addEventListener('click', () => setMode('gift'));
function setMode(m) {
    body.className = 'mode-' + m;
    btnDisk.classList.toggle('active', m === 'disk');
    btnGift.classList.toggle('active', m === 'gift');
}

// ── GUIDE ─────────────────────────────────────────
guideBtn.addEventListener('click', () => { guideMode = (guideMode + 1) % 3; renderGuide(); });

function renderGuide() {
    const S = 260;
    const ls = 'stroke="rgba(255,255,255,0.8)" stroke-width="0.75"';
    const labels = ['', '2分割', '3分割'];

    guideBtn.classList.toggle('active', guideMode !== 0);
    guideLabel.textContent = labels[guideMode];

    if (guideMode === 0) { guideSvg.innerHTML = ''; return; }

    let lines = '';
    if (guideMode === 1) {
        lines = `<line x1="${S/2}" y1="0" x2="${S/2}" y2="${S}" ${ls}/>
                 <line x1="0" y1="${S/2}" x2="${S}" y2="${S/2}" ${ls}/>`;
    } else {
        const a = S/3, b = S*2/3;
        lines = `<line x1="${a}" y1="0" x2="${a}" y2="${S}" ${ls}/>
                 <line x1="${b}" y1="0" x2="${b}" y2="${S}" ${ls}/>
                 <line x1="0" y1="${a}" x2="${S}" y2="${a}" ${ls}/>
                 <line x1="0" y1="${b}" x2="${S}" y2="${b}" ${ls}/>`;
    }
    guideSvg.innerHTML = lines;
}

// ── FILES ─────────────────────────────────────────
fileInput.addEventListener('change', e => load(e.target.files));
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('drag-over'); load(e.dataTransfer.files); });
stage.addEventListener('dragover', e => { e.preventDefault(); stage.classList.add('drag-over'); });
stage.addEventListener('dragleave', () => stage.classList.remove('drag-over'));
stage.addEventListener('drop', e => { e.preventDefault(); stage.classList.remove('drag-over'); load(e.dataTransfer.files); });

function load(fileList) {
    const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
    if (!files.length) return;
    let n = 0;
    const start = imgs.length;
    files.forEach(f => {
        const r = new FileReader();
        r.onload = e => {
            const probe = new Image();
            probe.onload = () => {
                imgs.push({ src: e.target.result, w: probe.naturalWidth, h: probe.naturalHeight });
                if (++n === files.length) { current = start; render(); }
            };
            probe.src = e.target.result;
        };
        r.readAsDataURL(f);
    });
}

// ── 実効解像度 ────────────────────────────────────
function calcDiscRes(w, h) {
    return Math.round(Math.min(w, h) * (512 / Math.max(w, h)));
}
function updateResInfo() {
    const img = imgs[current];
    if (!img?.w) { resInfo.classList.remove('visible'); return; }
    const disc  = calcDiscRes(img.w, img.h);
    const pct   = Math.round((disc / 512) * 100);
    const grade = disc >= 480 ? 'good' : disc >= 360 ? 'warn' : 'bad';
    resInfo.classList.add('visible');
    resValue.textContent  = `${disc}px / 512px`;
    resValue.className    = 'res-value ' + grade;
    resBar.style.width    = pct + '%';
    resBar.style.background = `var(--${grade})`;
}

// ── RENDER ────────────────────────────────────────
function render() {
    const old = holder.querySelector('img');
    if (old) old.remove();
    empty.style.display = imgs.length ? 'none' : 'flex';
    if (!imgs.length) {
        counterEl.textContent = '';
        dotsEl.innerHTML = '';
        thumbsEl.innerHTML = '';
        btnPrev.disabled = btnNext.disabled = true;
        resInfo.classList.remove('visible');
        return;
    }
    current = Math.max(0, Math.min(current, imgs.length - 1));
    const el = document.createElement('img');
    el.src = imgs[current].src;
    holder.insertBefore(el, holder.querySelector('.guide-overlay'));
    counterEl.textContent = `${current + 1} / ${imgs.length}`;
    updateResInfo();

    dotsEl.innerHTML = '';
    imgs.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot' + (i === current ? ' active' : '');
        d.addEventListener('click', () => { current = i; render(); });
        dotsEl.appendChild(d);
    });

    thumbsEl.innerHTML = '';
    imgs.forEach((im, i) => {
        const t = document.createElement('img');
        t.src = im.src;
        t.className = 'thumb' + (i === current ? ' active' : '');
        t.addEventListener('click', () => { current = i; render(); });
        thumbsEl.appendChild(t);
    });

    btnPrev.disabled = current === 0;
    btnNext.disabled = current === imgs.length - 1;
}

function go(dir) {
    const next = current + dir;
    if (next < 0 || next >= imgs.length) return;
    current = next; render();
}

btnPrev.addEventListener('click', () => go(-1));
btnNext.addEventListener('click', () => go(1));
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  go(-1);
    if (e.key === 'ArrowRight') go(1);
    if (e.key === '#') { guideMode = (guideMode + 1) % 3; renderGuide(); }
});

// ── SWIPE ─────────────────────────────────────────
let swipeX = null, swipeY = null;
stage.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    swipeX = e.touches[0].clientX; swipeY = e.touches[0].clientY;
}, { passive: true });
stage.addEventListener('touchend', e => {
    if (swipeX === null) return;
    const dx = e.changedTouches[0].clientX - swipeX;
    const dy = e.changedTouches[0].clientY - swipeY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
    swipeX = null; swipeY = null;
}, { passive: true });

render();
renderGuide();
</script>
</body>
</html>
